version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - python-app
    networks:
      - sample-project-network

  python-app:
    build: ./app
    volumes:
      - ./app:/app
    working_dir: /app
    networks:
      - sample-project-network

networks:
  sample-project-network:
    name: sample-project-network   # optional, name defaults to project_directory_network