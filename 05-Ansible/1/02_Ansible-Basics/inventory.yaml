---
all:
  children:
    production:
      children:
        webservers:
          hosts:
            web1:
              ansible_host: localhost
              ansible_connection: local
            web2:
              ansible_host: localhost
              ansible_connection: local
          vars:
            http_port: 80
            max_clients: 200
        dbservers:
          hosts:
            db1:
              ansible_host: localhost
              ansible_connection: local
          vars:
            db_port: 3306
        appservers:
          hosts:
            app1:
              ansible_host: localhost
              ansible_connection: local
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_user: ubuntu
